            --moss: #4a5d4e;

            --clay: #8c6a5e;
            --text: #2d3436;

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {

            line-height: 1.7;
        }

        header {
            background: rgba(250, 248, 245, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.5rem 2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;

            justify-content: space-between;
            align-items: center;
        }

        .logo {

            font-size: 1.6rem; 
            text-transform: uppercase; 
            letter-spacing: 0.15em; 
            text-decoration: none; 
            color: var(--deep-forest);

        .logo span { 
            color: var(--moss);

            font-size: 1.2rem;
        }

        main {

            max-width: 1200px;
            margin: 0 auto;
            padding-left: 2rem;
            padding-right: 2rem;
        }

        .hero {
            text-align: center;
            margin-bottom: 4rem;
        }

        h1 { 
            font-family: var(--serif); 
            font-size: clamp(2rem, 6vw, 4rem); 
            font-weight: 300; 
            line-height: 1.1; 
            color: var(--deep-forest);
            margin-bottom: 2rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .gallery-item {
            overflow: hidden;
            background: #eee;
            aspect-ratio: 4/3;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .contact-section {
            background-color: var(--moss);
            color: white;
            padding: 6rem 2rem;
            text-align: center;
            margin-top: 4rem;
        }

        .email-link {
            color: var(--earth);
            font-size: 1.5rem;
            text-decoration: none;
            border-bottom: 1px solid var(--earth);
        }

        footer {
            padding: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--moss);
